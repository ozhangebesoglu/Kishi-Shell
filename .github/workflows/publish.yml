name: Release & Publish

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - run: python -m pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  aur-publish:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update PKGBUILD Version and Checksum locally
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://github.com/ozhangebesoglu/Kishi-Shell/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          TARBALL_HASH=$(curl -sL $TARBALL_URL | sha256sum | awk '{print $1}')

          # We need to temporarily create a PKGBUILD in the repo to publish it
          mkdir -p .aur
          cp aur-packages/kishi-shell/PKGBUILD .aur/
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" .aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" .aur/PKGBUILD
          sed -i "s/^sha256sums=('.*')/sha256sums=('$TARBALL_HASH')/" .aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: kishi-shell
          pkgbuild: ./.aur/PKGBUILD
          commit_username: ${{ github.actor }}
          commit_email: ${{ github.actor }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "chore: Auto-update to ${{ github.ref_name }}"
