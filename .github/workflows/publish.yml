name: Release & Publish

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - run: python -m pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  aur-publish:
    needs: github-release
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh curl sudo awk

      - name: Set up SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          # Güvenlikten ziyade çalışabilirliği sağlamak için Host Key doğrulamasını devredışı bırakıyoruz.
          # (GitHub Actions container'ları bazen ~/.ssh/ dizinini farklı yorumladığı için statik key'ler patlayabiliyor)
          cat <<EOF >> ~/.ssh/config
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Clone AUR Repo
        run: git clone ssh://aur@aur.archlinux.org/kishi-shell.git aur-repo

      - name: Update PKGBUILD and Push
        run: |
          cd aur-repo

          # Extract version from tag (e.g., v1.9.5 -> 1.9.5)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating AUR package to version $VERSION"

          # Get tarball hash
          TARBALL_URL="https://github.com/ozhangebesoglu/Kishi-Shell/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          TARBALL_HASH=$(curl -sL $TARBALL_URL | sha256sum | awk '{print $1}')
          echo "Calculated hash: $TARBALL_HASH"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=('.*')/sha256sums=('$TARBALL_HASH')/" PKGBUILD

          # Setup builder user for makepkg (root cannot run makepkg)
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

          # Generate .SRCINFO
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

          # Commit and Push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "chore: Auto-update to ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push
